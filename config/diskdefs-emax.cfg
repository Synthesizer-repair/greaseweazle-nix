# E-mu Systems EMAX II — 800KB DD format
# Derived from a flux dump of a genuine EMAX II disk:
#   MFM, 250 kbit/s, 80 cyl x 2 heads, 10 sectors/track, 512 bytes/sector,
#   sector IDs 1..10. Total = 819,200 bytes.
disk emax2
    cyls = 80
    heads = 2
    tracks * ibm.mfm
        secs = 10
        bps = 512
        id = 1
        rate = 250
    end
end
